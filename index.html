<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 분석기</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <h1>데이터 분석 서비스</h1>
    </header>

    <main>
        <section class="selectors">
            <h4>Scenario</h4>
            <select name="option1">
                <option>Aggressive Growth</option>
                <option>Stability</option>
                <option></option>
            </select>
            <!-- <select name="option2"><option>선택사항 2</option></select> -->
        </section>

        <section class="inputs">
            <input type="number" placeholder="값 1">
            <input type="number" placeholder="값 2">
            <input type="number" placeholder="값 3">
            <input type="number" placeholder="값 4">
        </section>

        <button id="start-btn">START</button>

        <section id="result-section" class="hidden">
            <table>
                <thead><tr><th>항목</th><th>결과 (%)</th></tr></thead>
                <tbody>
                    <tr><td>항목 1</td><td>85%</td></tr>
                    <tr><td>항목 2</td><td>40%</td></tr>
                    </tbody>
            </table>
            <div class="action-buttons">
                <button>공유하기</button>
                <button>저장하기</button>
            </div>
        </section>
    </main>

    <script src="./jsFiles/index.js" />
</body>
</html>
